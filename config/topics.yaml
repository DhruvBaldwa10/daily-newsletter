newsletter:
  title: "Daily AI Digest"
  author: "Dhruv"

topics:
  - name: "AI & LLMs"
    keywords: ["artificial intelligence", "large language model", "LLM", "GPT", "Claude", "Gemini", "foundation model", "frontier model"]
  - name: "AI Tools & SDKs"
    keywords: ["Claude Code", "Codex", "Cursor", "Copilot", "AI SDK", "Anthropic SDK", "OpenAI SDK", "Vercel AI", "Windsurf", "Replit Agent"]
  - name: "Context Engineering"
    keywords: ["context window", "context engineering", "RAG", "retrieval augmented", "prompt engineering", "system prompt", "MCP", "model context protocol"]
  - name: "AI Agents & Multi-Agent"
    keywords: ["AI agent", "multi-agent", "agent swarm", "collaborative AI", "AI orchestration", "tool use", "function calling", "computer use"]
  - name: "AI Infrastructure"
    keywords: ["inference", "fine-tuning", "RLHF", "training", "GPU", "TPU", "model serving", "vLLM", "ollama"]
  - name: "AI Product & Go-to-Market"
    keywords: ["AI product", "AI pricing", "AI startup", "AI launch", "YC", "product-led growth", "AI wrapper", "AI moat", "AI UX"]
  - name: "Evals & Benchmarks"
    keywords: ["benchmark", "eval", "leaderboard", "MMLU", "HumanEval", "arena", "model comparison", "red teaming"]
  - name: "AI Safety & Regulation"
    keywords: ["AI safety", "alignment", "AI regulation", "AI policy", "EU AI Act", "responsible AI", "AI governance"]
  - name: "AI UX & Design Patterns"
    keywords: ["AI UX", "AI interface", "copilot pattern", "chat interface", "AI onboarding", "human-in-the-loop", "AI design"]

sources:
  hackernews:
    enabled: true
    max_stories: 30

  arxiv:
    enabled: true
    categories: ["cs.CL", "cs.AI", "cs.LG"]
    max_results: 12
    # Keyword queries (defaults to topic keywords if omitted). Kept tight so the
    # results stay relevant to what a builder-PM cares about.
    queries:
      - "large language model"
      - "AI agent"
      - "retrieval augmented generation"
      - "reasoning"
      - "evaluation benchmark"
      - "fine-tuning"

  reddit:
    enabled: true
    subreddits:
      - "MachineLearning"
      - "LocalLLaMA"
      - "ClaudeAI"
      - "OpenAI"
      - "ChatGPT"
      - "Anthropic"
      - "cursor"
      - "artificial"
      - "singularity"
    max_posts_per_sub: 10

  rss:
    enabled: true
    feeds:
      # Builder / practitioner voices
      - name: "Simon Willison"
        url: "https://simonwillison.net/atom/everything/"
      - name: "Chip Huyen"
        url: "https://huyenchip.com/feed.xml"
      - name: "Eugene Yan"
        url: "https://eugeneyan.com/rss/"
      - name: "Hamel Husain"
        url: "https://hamel.dev/index.xml"

      # Research-to-product bridge
      - name: "Ahead of AI (Sebastian Raschka)"
        url: "https://magazine.sebastianraschka.com/feed"
      - name: "Interconnects (Nathan Lambert)"
        url: "https://www.interconnects.ai/feed"
      - name: "The Gradient"
        url: "https://thegradient.pub/rss/"
      - name: "One Useful Thing (Ethan Mollick)"
        url: "https://www.oneusefulthing.org/feed"
      - name: "Import AI (Jack Clark)"
        url: "https://importai.substack.com/feed"
      - name: "AI Snake Oil (Narayanan & Kapoor)"
        url: "https://www.aisnakeoil.com/feed"
      - name: "Semianalysis (Dylan Patel)"
        url: "https://www.semianalysis.com/feed"
      - name: "Pragmatic Engineer (Gergely Orosz)"
        url: "https://blog.pragmaticengineer.com/rss/"

      # Company blogs
      # NOTE: Anthropic removed their public RSS feed (all known URLs 404 as of 2026-05).
      #       Anthropic news still surfaces via HN/Reddit/other feeds. Re-add if a feed returns.
      - name: "OpenAI Blog"
        url: "https://openai.com/blog/rss.xml"
      - name: "Google AI Blog"
        url: "https://blog.google/technology/ai/rss/"
      - name: "Google DeepMind Blog"
        url: "https://deepmind.google/blog/rss.xml"
      - name: "Hugging Face Blog"
        url: "https://huggingface.co/blog/feed.xml"

      # PM-oriented newsletters
      - name: "Latent Space (swyx)"
        url: "https://www.latent.space/feed"
      # The Batch (deeplearning.ai) removed — feed returns 404/500 across all known URLs (2026-05).
      - name: "Lil'Log"
        url: "https://lilianweng.github.io/index.xml"

  twitter:
    enabled: false
    bearer_token_env: "TWITTER_BEARER_TOKEN"
    accounts:
      - "AnthropicAI"
      - "OpenAI"
      - "swaborojevic"

  podcasts:
    enabled: true
    feeds:
      - name: "Latent Space"
        url: "https://api.substack.com/feed/podcast/1084089.rss"
      - name: "Lenny's Podcast"
        url: "https://api.substack.com/feed/podcast/10434.rss"
      - name: "Dwarkesh Patel"
        url: "https://api.substack.com/feed/podcast/968538.rss"
      - name: "No Priors"
        url: "https://feeds.transistor.fm/no-priors-ai-machine-learning-technology-a16z"
      - name: "Cognitive Revolution"
        url: "https://feeds.buzzsprout.com/2015582.rss"
      - name: "Lex Fridman"
        url: "https://lexfridman.com/feed/podcast/"
